name: leap_mobile
description: Leap Auto Parts Marketplace — buyer-facing mobile app.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Real image caching (new) -- product images were previously
  # Image.network everywhere, meaning the SAME product's thumbnail
  # re-fetched from the network on every scroll back into view (home
  # feed, category browse, search results all rebuild product_card.dart
  # repeatedly). Caches to disk after the first real fetch.
  cached_network_image: ^3.4.1
  # Explicit (was already a transitive dep of `http`) -- needed directly
  # to set a real MediaType/content-type on photo uploads; see
  # api_client.dart's _mediaTypeFor for why that's required on web.
  http_parser: ^4.1.0
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0          # declarative routing between screens
  provider: ^6.1.2            # simple state management for the MVP
  http: ^1.2.1                # API client to services/api
  intl: ^0.19.0                # currency / date formatting per locale
  flutter_secure_storage: ^9.2.2  # auth token storage (never plain SharedPreferences for tokens)
  uuid: ^4.4.0                     # generates a persistent per-device cart ID
  geolocator: ^13.0.1              # real device location, for the guest post-order address suggestion (migration 030)
  image_picker: ^1.1.2             # real photo selection for review photos (migration 031)
  share_plus: ^10.1.2               # real native share sheet for shareable product links (new)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Real Android/iOS launcher icon generation from one source image (new)
  # -- see the mobile README's "Real device builds (Android, iOS,
  # Huawei)" section for the full real setup.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/

# Real config for flutter_launcher_icons (new) -- run
# `flutter pub run flutter_launcher_icons` after `flutter create .` has
# generated the real android/ (and ios/) platform folders, and after
# placing the real source icon at assets/icon/icon.png (1024x1024).
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
